openapi: "3.1.0"
info:
  title: Profile Views Counter API
  version: "1.0.0"
  description: |
    Open-source, privacy-safe GitHub profile view counter.
    Embed a dynamic SVG badge in any README or webpage.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://github.com/YOUR_USERNAME/profile-views

servers:
  - url: https://profile-views.YOUR_SUBDOMAIN.workers.dev
    description: Production (Cloudflare Workers)
  - url: http://localhost:8787
    description: Local dev

tags:
  - name: Badge
    description: SVG badge endpoints
  - name: Analytics
    description: JSON analytics endpoints
  - name: System
    description: Health and meta endpoints

paths:
  /badge:
    get:
      summary: Get SVG badge
      tags: [Badge]
      description: |
        Returns a dynamic SVG badge showing the view count.
        Embed with `![Views](https://your-api/badge?user=USERNAME)`.
        Each request from a real browser increments the counter.
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: GitHub username
          example: octocat
        - name: label
          in: query
          schema:
            type: string
            default: "Profile Views"
          description: Badge label text
        - name: color
          in: query
          schema:
            type: string
            default: "4c8eda"
          description: Hex color for the value portion (without #)
        - name: labelColor
          in: query
          schema:
            type: string
            default: "555"
          description: Hex color for the label portion (without #)
        - name: style
          in: query
          schema:
            type: string
            enum: [flat, flat-square, plastic, for-the-badge]
            default: flat
          description: Badge style
        - name: theme
          in: query
          schema:
            type: string
            enum: [light, dark]
            default: light
          description: Color theme
        - name: format
          in: query
          schema:
            type: string
            enum: [short, full]
            default: short
          description: Number format (short=1.2K, full=1234)
        - name: type
          in: query
          schema:
            type: string
            enum: [total, unique, daily]
            default: total
          description: Which count to display
        - name: counter
          in: query
          schema:
            type: string
            default: default
          description: Named counter (for per-repo tracking)
      responses:
        "200":
          description: SVG badge image
          content:
            image/svg+xml:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/views:
    get:
      summary: Get current view count (JSON)
      tags: [Analytics]
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewsResponse"

  /stats:
    get:
      summary: Get detailed stats (JSON)
      tags: [Analytics]
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 7
            maximum: 30
          description: Number of days of daily history to return
      responses:
        "200":
          description: Stats object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Healthy
        "503":
          description: Degraded

components:
  schemas:
    ViewsResponse:
      type: object
      properties:
        user:
          type: string
        views:
          type: integer
        unique:
          type: integer
        is_unique_visit:
          type: boolean
        daily:
          type: integer

    StatsResponse:
      type: object
      properties:
        user:
          type: string
        total_views:
          type: integer
        unique_visitors:
          type: integer
        today:
          type: integer
        this_week:
          type: integer
        daily:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              views:
                type: integer
        generated_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              status:
                type: integer
