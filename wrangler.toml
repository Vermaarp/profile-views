name = "profile-views"
main = "api/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"          # replace after `wrangler kv:namespace create VIEWS`
preview_id = "YOUR_PREVIEW_KV_ID"   # replace with preview namespace id

[placement]
mode = "smart"   # Cloudflare Smart Placement for optimal latency

[[rules]]
type = "ESModule"
globs = ["**/*.js"]

[build]
command = ""

# Rate limiting via KV — no extra config needed
# Optional: add a custom domain
# [[routes]]
# pattern = "views.yourdomain.com/*"
# zone_name = "yourdomain.com"
