name = "profile-views"
main = "api/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"

[[kv_namespaces]]
binding = "KV"
id = "e23e1c590416440c82543efc0327035d"
preview_id = "711e17950ffc439bad54fcc7c80c5711"

[placement]
mode = "smart"   # Cloudflare Smart Placement for optimal latency

[[rules]]
type = "ESModule"
globs = ["**/*.js"]

[build]
command = ""

# Rate limiting via KV — no extra config needed
# Optional: add a custom domain
# [[routes]]
# pattern = "views.yourdomain.com/*"
# zone_name = "yourdomain.com"
